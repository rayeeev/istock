<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320">
  <defs>

    <!-- TOP FACE — sky/water blue, lit from above -->
    <linearGradient id="gTop" x1="160" y1="50" x2="210" y2="160"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6DD4F8"/>
      <stop offset="100%" stop-color="#003A8C"/>
    </linearGradient>

    <!-- RIGHT FACE — deep navy, technology / industrial depth -->
    <linearGradient id="gRight" x1="255" y1="105" x2="180" y2="270"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0052BF"/>
      <stop offset="100%" stop-color="#000A1C"/>
    </linearGradient>

    <!-- LEFT FACE — emerald green, sustainability / environment -->
    <linearGradient id="gLeft" x1="65" y1="105" x2="140" y2="270"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#2ED962"/>
      <stop offset="100%" stop-color="#00240F"/>
    </linearGradient>

    <!-- Edge highlight gradient (for outer lit rim) -->
    <linearGradient id="gRimTop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.15"/>
    </linearGradient>

    <!-- Soft drop shadow on whole mark -->
    <filter id="markShadow" x="-18%" y="-12%" width="136%" height="136%">
      <feDropShadow dx="0" dy="8" stdDeviation="14"
                    flood-color="#001840" flood-opacity="0.45"/>
    </filter>

    <!-- Glow filter for wave arcs -->
    <filter id="waveGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip to top face for internal details -->
    <clipPath id="cTop">
      <path d="M160,50 L255,105 L160,160 L65,105 Z"/>
    </clipPath>

    <!-- Clip to right face for internal details -->
    <clipPath id="cRight">
      <path d="M255,105 L255,215 L160,270 L160,160 Z"/>
    </clipPath>

    <!-- Clip to left face for internal details -->
    <clipPath id="cLeft">
      <path d="M65,105 L160,160 L160,270 L65,215 Z"/>
    </clipPath>

  </defs>

  <!-- ── THREE ISOMETRIC CUBE FACES ───────────────── -->

  <!-- TOP face — water blue (sky, purity, the product) -->
  <path d="M160,50 L255,105 L160,160 L65,105 Z"
        fill="url(#gTop)"/>

  <!-- RIGHT face — deep navy (technology, precision, industry) -->
  <path d="M255,105 L255,215 L160,270 L160,160 Z"
        fill="url(#gRight)"/>

  <!-- LEFT face — emerald green (environment, sustainability, nature) -->
  <path d="M65,105 L160,160 L160,270 L65,215 Z"
        fill="url(#gLeft)"/>

  <!-- ── INTERNAL DETAIL — blue top face ───────────
       Two faint wave arcs suggesting water flow       -->
  <g clip-path="url(#cTop)" filter="url(#waveGlow)">
    <!-- Wave 1 — upper zone -->
    <path d="M97,87 Q160,71 223,87"
          stroke="white" stroke-width="2.4"
          fill="none" stroke-linecap="round" opacity="0.30"/>
    <!-- Wave 2 — lower zone -->
    <path d="M89,118 Q160,102 231,118"
          stroke="white" stroke-width="1.9"
          fill="none" stroke-linecap="round" opacity="0.22"/>
  </g>

  <!-- ── INTERNAL DETAIL — green left face ─────────
       Thin molecular ring (catalyst / molecular bond) -->
  <g clip-path="url(#cLeft)">
    <ellipse cx="111" cy="192" rx="28" ry="14"
             fill="none" stroke="white" stroke-width="1.4"
             stroke-opacity="0.20"
             transform="rotate(-30 111 192)"/>
  </g>

  <!-- ── INTERNAL DETAIL — navy right face ─────────
       Diagonal precision line (engineering, machined) -->
  <g clip-path="url(#cRight)">
    <line x1="255" y1="140" x2="175" y2="258"
          stroke="white" stroke-width="1.2"
          stroke-opacity="0.14" stroke-linecap="round"/>
  </g>

  <!-- ── OUTER RIM HIGHLIGHTS (bevel, light source: upper-left) ── -->

  <!-- Top-left outer edge — brightest rim (full light) -->
  <line x1="160" y1="50" x2="65" y2="105"
        stroke="white" stroke-width="2"
        stroke-opacity="0.50" stroke-linecap="round"/>

  <!-- Top-right outer edge — medium light -->
  <line x1="160" y1="50" x2="255" y2="105"
        stroke="white" stroke-width="1.5"
        stroke-opacity="0.30" stroke-linecap="round"/>

  <!-- Left outer edge (green face) — medium light -->
  <line x1="65" y1="105" x2="65" y2="215"
        stroke="white" stroke-width="1.2"
        stroke-opacity="0.22" stroke-linecap="round"/>

  <!-- Right outer edge (navy) — dim (turning away from light) -->
  <line x1="255" y1="105" x2="255" y2="215"
        stroke="white" stroke-width="1"
        stroke-opacity="0.10" stroke-linecap="round"/>

  <!-- Bottom edges — shadow rim -->
  <path d="M65,215 L160,270 L255,215"
        fill="none" stroke="#000814"
        stroke-width="1.5" stroke-opacity="0.35"
        stroke-linejoin="round"/>

  <!-- ── ISOMETRIC RIDGE LINES ──────────────────────
       The three inner edges of the cube, creating
       physical separation between the three faces     -->
  <line x1="160" y1="160" x2="255" y2="105"
        stroke="white" stroke-width="5"
        stroke-linecap="butt"/>
  <line x1="160" y1="160" x2="160" y2="270"
        stroke="white" stroke-width="5"
        stroke-linecap="butt"/>
  <line x1="160" y1="160" x2="65"  y2="105"
        stroke="white" stroke-width="5"
        stroke-linecap="butt"/>

  <!-- ── CENTER VERTEX ─────────────────────────────
       Where all three ridges converge — focal jewel  -->
  <circle cx="160" cy="160" r="7" fill="white" opacity="0.96"/>
  <circle cx="160" cy="160" r="3.8" fill="#A0DCFF" opacity="0.82"/>

</svg>
